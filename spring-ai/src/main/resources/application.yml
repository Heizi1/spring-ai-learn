spring:
  application:
    name: spring-ai
  output:
    ansi:
      enabled: always
  ai:
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}
      base-url: https://open.bigmodel.cn/api/paas
      chat:
        options:
          model: glm-4.7
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-this-development-secret-change-this}
      issuer: spring-ai-learn
      access-token-ttl: 30m
      refresh-token-ttl: 30d
      refresh-cookie-name: refresh_token

logging:
  level:
    root: debug
    com.heizi.ai: debug
  file:
    name: logs/spring-ai/spring.log
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} %clr(-){faint} %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
